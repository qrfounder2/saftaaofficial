server {
    listen 80;
    server_name localhost;

    # Advanced Elite Security Shield (Cloudflare Integration)
    set $allowed 0;
    
    # 1. Allow traffic if Cloudflare identifies it from Saudi Arabia
    if ($http_cf_ipcountry = "SA") {
        set $allowed 1;
    }

    # 2. Allow if Admin Secret Cookie is present (for your iPhone/Mac in Thailand)
    if ($http_cookie ~* "saftaa_elite_guard=active") {
        set $allowed 1;
    }

    # 3. Allow if Admin URL Bypass is used
    if ($arg_elite_pass = "thailand_master_2026") {
        set $allowed 1;
    }

    # Frontend Protection
    location / {
        # Redirect "deadly competitors" and non-SA traffic to a decoy (e.g., Salla main site)
        if ($allowed = 0) {
            return 301 https://salla.com/ar/;
        }

        # Set persistent secure cookie when you use the secret bypass URL
        if ($arg_elite_pass = "thailand_master_2026") {
            add_header Set-Cookie "saftaa_elite_guard=active; Path=/; Max-Age=31536000; HttpOnly";
        }

        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Protection
    location /api/ {
        if ($allowed = 0) {
            return 403;
        }
        
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Pass Cloudflare headers to Node.js backend
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
    }
}
